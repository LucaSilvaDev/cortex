<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cortex</title>
    <link rel="icon" type="image/png" href="/cortex-icon-256.png" />
    <link rel="apple-touch-icon" href="/cortex-icon-256.png" />
    <script>
      try {
        const stored = localStorage.getItem('cortex-ui')
        const theme = stored ? JSON.parse(stored)?.state?.theme : 'dark'
        if (theme !== 'light') document.documentElement.classList.add('dark')
      } catch {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
